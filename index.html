<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Task Tracker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Semi+Condensed:wght@600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #EDF0EE;
    --surface: #FFFFFF;
    --ink: #1B2429;
    --ink-soft: #5B6A70;
    --line: #CBD3D1;
    --header: #1F2A30;
    --header-ink: #EDF0EE;

    --open-bg: #FFFFFF;
    --open-tab: #8B96A0;

    --prog-bg: #FCEFC2;
    --prog-tab: #E0A62E;

    --closed-bg: #DCE8D6;
    --closed-tab: #6E9C5B;

    --crit-low: #8B96A0;
    --crit-med: #E0A62E;
    --crit-high: #E07B34;
    --crit-crit: #D5462F;

    --radius: 10px;
    --font-head: 'Barlow Semi Condensed', sans-serif;
    --font-body: 'Inter', sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-tap-highlight-color:transparent;}
  h1,h2,h3{font-family:var(--font-head);letter-spacing:.02em;margin:0;}

  .topbar{
    position:sticky;top:0;z-index:20;
    background:var(--header);color:var(--header-ink);
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 16px;
  }
  .topbar h1{font-size:22px;font-weight:800;text-transform:uppercase;letter-spacing:.06em;}
  .topbar .actions{display:flex;gap:8px;}
  .icon-btn{
    background:transparent;border:1px solid rgba(237,240,238,.35);color:var(--header-ink);
    border-radius:8px;width:38px;height:38px;font-size:17px;cursor:pointer;
  }
  .add-btn{
    background:#E0A62E;color:#1F2A30;border:none;border-radius:8px;
    padding:0 16px;height:38px;font-weight:700;font-family:var(--font-body);cursor:pointer;
  }
  .add-btn:active{transform:scale(.97);}

  .wrap{max-width:1200px;margin:0 auto;padding:14px 12px 90px;}

  /* Daily strip */
  .daily-section{margin-bottom:18px;}
  .section-label{font-family:var(--font-head);font-size:13px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--ink-soft);margin:0 2px 8px;display:flex;align-items:center;gap:8px;}
  .daily-strip{display:flex;flex-direction:column;gap:8px;}
  .daily-item{
    display:flex;align-items:center;gap:10px;background:var(--surface);
    border:1px solid var(--line);border-left:5px solid var(--open-tab);
    border-radius:var(--radius);padding:10px 12px;
  }
  .daily-item.done{border-left-color:var(--closed-tab);background:var(--closed-bg);}
  .daily-item.overdue{border-left-color:var(--crit-crit);animation:pulse 1.8s infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(213,70,47,.35);}50%{box-shadow:0 0 0 5px rgba(213,70,47,0);}}
  .daily-check{
    width:26px;height:26px;flex:0 0 auto;border-radius:6px;border:2px solid var(--ink-soft);
    background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--closed-tab);
  }
  .daily-item.done .daily-check{border-color:var(--closed-tab);}
  .daily-text{flex:1;font-size:14.5px;font-weight:500;}
  .daily-text small{display:block;color:var(--ink-soft);font-weight:400;}

  /* Board */
  .board{
    display:grid;grid-template-columns:1fr;gap:10px;
  }
  @media(min-width:760px){
    .board{grid-template-columns:repeat(2,1fr);gap:12px;}
  }
  @media(min-width:1080px){
    .board{grid-template-columns:repeat(3,1fr);gap:14px;}
  }

  .card-wrapper{position:relative;overflow:hidden;border-radius:var(--radius);}
  .swipe-action{
    position:absolute;inset:0;background:var(--closed-tab);color:#fff;
    display:flex;align-items:center;justify-content:flex-end;padding-right:22px;
    font-family:var(--font-head);font-weight:700;font-size:16px;letter-spacing:.05em;
  }
  .task-card{
    position:relative;background:var(--open-bg);border:1px solid var(--line);
    border-left:6px solid var(--open-tab);border-radius:var(--radius);
    padding:12px 14px;touch-action:pan-y;
  }
  .task-card.dragging{transition:none;}
  .task-card.settled{transition:transform .18s ease;}
  .task-card.status-inprogress{background:var(--prog-bg);border-left-color:var(--prog-tab);}
  .task-card.status-closed{background:var(--closed-bg);border-left-color:var(--closed-tab);}

  .card-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;gap:8px;}
  .source-tag{
    font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;font-weight:700;
    color:var(--ink-soft);background:rgba(0,0,0,.05);padding:3px 7px;border-radius:5px;
  }
  .crit-badge{font-size:10.5px;font-weight:700;color:#fff;padding:3px 8px;border-radius:20px;text-transform:uppercase;letter-spacing:.04em;}
  .crit-Low{background:var(--crit-low);}
  .crit-Medium{background:var(--crit-med);color:#1B2429;}
  .crit-High{background:var(--crit-high);}
  .crit-Critical{background:var(--crit-crit);}

  .desc{font-size:16px;font-weight:700;margin-bottom:6px;line-height:1.25;}
  .meta{font-size:13.5px;color:var(--ink-soft);margin-bottom:3px;line-height:1.4;}
  .meta b{color:var(--ink);font-weight:600;}
  .meta.empty{display:none;}

  .card-controls{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap;}
  .chip-btn{
    border:1px solid var(--line);background:var(--surface);border-radius:7px;
    font-size:12px;font-weight:600;padding:6px 10px;cursor:pointer;color:var(--ink);
  }
  .chip-btn.danger{color:#B5402B;border-color:#E3B7A8;}

  .empty-state{
    grid-column:1/-1;text-align:center;padding:50px 20px;color:var(--ink-soft);
  }
  .empty-state h3{font-size:18px;margin-bottom:6px;color:var(--ink);}

  /* Closed drawer */
  .closed-drawer{margin-top:22px;}
  .closed-toggle{
    width:100%;text-align:left;background:transparent;border:none;border-top:1px dashed var(--line);
    padding:12px 4px;font-family:var(--font-head);font-weight:700;letter-spacing:.05em;
    text-transform:uppercase;font-size:13px;color:var(--ink-soft);cursor:pointer;
  }
  .closed-list{display:grid;grid-template-columns:1fr;gap:8px;margin-top:8px;}
  @media(min-width:760px){.closed-list{grid-template-columns:repeat(2,1fr);}}
  @media(min-width:1080px){.closed-list{grid-template-columns:repeat(3,1fr);}}

  /* Modal */
  .modal-overlay{
    position:fixed;inset:0;background:rgba(20,26,29,.55);z-index:50;
    display:flex;align-items:flex-end;justify-content:center;
  }
  .modal-overlay[hidden]{display:none;}
  @media(min-width:700px){.modal-overlay{align-items:center;}}
  .modal{
    background:var(--surface);width:100%;max-width:520px;max-height:88vh;overflow-y:auto;
    border-radius:16px 16px 0 0;padding:20px;
  }
  @media(min-width:700px){.modal{border-radius:14px;}}
  .modal h2{font-size:20px;margin-bottom:14px;text-transform:uppercase;letter-spacing:.04em;}
  .field{margin-bottom:12px;}
  .field label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.05em;margin-bottom:5px;}
  .field input, .field select, .field textarea{
    width:100%;border:1px solid var(--line);border-radius:8px;padding:9px 11px;font-size:14.5px;
    font-family:var(--font-body);background:#FBFCFB;color:var(--ink);
  }
  .field textarea{resize:vertical;min-height:54px;}
  .field-row{display:flex;gap:10px;}
  .field-row .field{flex:1;}
  .toggle-row{display:flex;align-items:center;gap:8px;margin-bottom:14px;}
  .toggle-row input{width:18px;height:18px;}
  .modal-actions{display:flex;gap:8px;margin-top:16px;}
  .btn{flex:1;padding:11px;border-radius:8px;border:none;font-weight:700;font-family:var(--font-body);cursor:pointer;font-size:14.5px;}
  .btn-primary{background:#1F2A30;color:#fff;}
  .btn-secondary{background:#EDF0EE;color:var(--ink);border:1px solid var(--line);}
  .btn-danger{background:#D5462F;color:#fff;}

  .setup-note{font-size:13px;color:var(--ink-soft);line-height:1.5;background:#F5F3ED;border:1px solid var(--line);border-radius:8px;padding:10px 12px;margin-bottom:14px;}
  .setup-note code{background:#fff;padding:1px 5px;border-radius:4px;font-size:12px;}

  #toast{
    position:fixed;bottom:18px;left:50%;transform:translateX(-50%);
    background:#1F2A30;color:#fff;padding:10px 18px;border-radius:8px;font-size:13.5px;
    opacity:0;pointer-events:none;transition:opacity .25s;z-index:60;
  }
  #toast.show{opacity:1;}

  .status-msg{text-align:center;color:var(--ink-soft);font-size:13px;padding:10px;}
</style>
</head>
<body>

<header class="topbar">
  <h1>Task Tracker</h1>
  <div class="actions">
    <button class="add-btn" id="addBtn">+ Add task</button>
  </div>
</header>

<div class="wrap">
  <div id="statusMsg" class="status-msg" hidden></div>

  <div class="daily-section" id="dailySection" hidden>
    <div class="section-label">Daily checklist</div>
    <div class="daily-strip" id="dailyStrip"></div>
  </div>

  <div class="section-label">Open &amp; in progress</div>
  <main class="board" id="board"></main>

  <div class="closed-drawer">
    <button class="closed-toggle" id="toggleClosed">Closed today (<span id="closedCount">0</span>) ▾</button>
    <div class="closed-list" id="closedList" hidden></div>
  </div>
</div>

<!-- Add / Edit modal -->
<div class="modal-overlay" id="taskOverlay" hidden>
  <div class="modal">
    <h2 id="taskModalTitle">Add task</h2>
    <div class="field">
      <label>Description</label>
      <textarea id="f_description" placeholder="What's the task?"></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Unit / Line</label>
        <input id="f_unit" placeholder="e.g. CanLine 1">
      </div>
      <div class="field">
        <label>Source</label>
        <select id="f_source">
          <option>Runnability Corrective</option>
          <option>SIC Action Plan</option>
          <option>Downtime Action Plan</option>
          <option>Manual</option>
          <option>Other</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Action</label>
      <textarea id="f_action" placeholder="What needs to be done"></textarea>
    </div>
    <div class="field">
      <label>Comment</label>
      <textarea id="f_comment" placeholder="e.g. Waiting on someone / parts / etc"></textarea>
    </div>
    <div class="field-row">
      <div class="field">
        <label>Criticality</label>
        <select id="f_criticality">
          <option>Low</option>
          <option>Medium</option>
          <option>High</option>
          <option>Critical</option>
        </select>
      </div>
      <div class="field">
        <label>Status</label>
        <select id="f_status">
          <option value="open">Open</option>
          <option value="inprogress">In progress</option>
          <option value="closed">Closed</option>
        </select>
      </div>
    </div>
    <div class="field">
      <label>Feedback</label>
      <textarea id="f_feedback" placeholder="Any feedback so far"></textarea>
    </div>
    <div class="toggle-row">
      <input type="checkbox" id="f_isDaily">
      <label for="f_isDaily" style="margin:0;text-transform:none;font-weight:500;color:var(--ink);">This is a daily recurring task</label>
    </div>
    <div class="modal-actions">
      <button class="btn btn-secondary" id="taskCancelBtn">Cancel</button>
      <button class="btn btn-danger" id="taskDeleteBtn" hidden>Delete</button>
      <button class="btn btn-primary" id="taskSaveBtn">Save task</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
(function(){
  // ======================================================================
  // PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE (ends in /exec)
  // ======================================================================
  var SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxolAozZeGc7i5_0SjIwSmRui3XfoRpEJwPdsThfjk7NkvpPzPBdv6K-cR5N_nEt5hx/exec';
  // ======================================================================

  var STORAGE_KEY = 'tt_tasks_cache_v1';

  var state = { tasks: [], scriptUrl: SCRIPT_URL, editingId: null };

  var els = {
    dailySection: document.getElementById('dailySection'),
    dailyStrip: document.getElementById('dailyStrip'),
    board: document.getElementById('board'),
    closedList: document.getElementById('closedList'),
    closedCount: document.getElementById('closedCount'),
    toggleClosed: document.getElementById('toggleClosed'),
    statusMsg: document.getElementById('statusMsg'),
    toast: document.getElementById('toast')
  };

  function toast(msg){
    els.toast.textContent = msg;
    els.toast.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(function(){ els.toast.classList.remove('show'); }, 2200);
  }

  function todayStr(){ return new Date().toISOString().slice(0,10); }

  function saveCache(){ localStorage.setItem(STORAGE_KEY, JSON.stringify(state.tasks)); }
  function loadCache(){
    try{ state.tasks = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }catch(e){ state.tasks = []; }
  }

  // ---------- API ----------
  function urlReady(){
    return state.scriptUrl && state.scriptUrl.indexOf('PASTE_YOUR_SCRIPT_URL_HERE') === -1;
  }

  function api(action, payload){
    if(!urlReady()){
      toast('No Google Sheet link set in the code yet');
      return Promise.reject('no url');
    }
    var body = Object.assign({ action: action }, payload);
    return fetch(state.scriptUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body)
    }).then(function(r){ return r.json(); });
  }

  function fetchAll(){
    if(!urlReady()){ render(); return; }
    els.statusMsg.hidden = false; els.statusMsg.textContent = 'Syncing with Google Sheet...';
    fetch(state.scriptUrl)
      .then(function(r){ return r.json(); })
      .then(function(data){
        state.tasks = data.tasks || [];
        saveCache();
        els.statusMsg.hidden = true;
        render();
      })
      .catch(function(err){
        els.statusMsg.textContent = 'Could not reach the sheet — showing last saved copy.';
        render();
      });
  }

  // ---------- Rendering ----------
  function render(){
    var daily = state.tasks.filter(function(t){ return t.isDaily; });
    var regular = state.tasks.filter(function(t){ return !t.isDaily; });

    // Daily checklist
    els.dailySection.hidden = daily.length === 0;
    els.dailyStrip.innerHTML = '';
    daily.forEach(function(t){
      var doneToday = t.lastDone === todayStr();
      var item = document.createElement('div');
      item.className = 'daily-item' + (doneToday ? ' done' : '');
      var hour = new Date().getHours();
      if(!doneToday && hour >= 14) item.className += ' overdue';
      item.innerHTML =
        '<div class="daily-check">' + (doneToday ? '✓' : '') + '</div>' +
        '<div class="daily-text" >' + escapeHtml(t.description || '(untitled)') +
        (t.unit ? '<small>' + escapeHtml(t.unit) + '</small>' : '') + '</div>';
      item.querySelector('.daily-check').addEventListener('click', function(){
        toggleDaily(t);
      });
      item.querySelector('.daily-text').addEventListener('click', function(){ openEdit(t); });
      els.dailyStrip.appendChild(item);
    });

    // Board: open + in progress
    var active = regular.filter(function(t){ return t.status !== 'closed'; });
    var closed = regular.filter(function(t){ return t.status === 'closed'; });

    els.board.innerHTML = '';
    if(active.length === 0){
      els.board.innerHTML = '<div class="empty-state"><h3>Nothing open</h3>All caught up. Tap "+ Add task" to log something new.</div>';
    } else {
      active.forEach(function(t){ els.board.appendChild(buildCard(t, true)); });
    }

    els.closedList.innerHTML = '';
    closed.forEach(function(t){ els.closedList.appendChild(buildCard(t, false)); });
    els.closedCount.textContent = closed.length;
  }

  function escapeHtml(s){
    return (s || '').replace(/[&<>"']/g, function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }

  function metaLine(label, value){
    if(!value) return '';
    return '<div class="meta"><b>' + label + ':</b> ' + escapeHtml(value) + '</div>';
  }

  function buildCard(t, swipable){
    var wrapper = document.createElement('div');
    wrapper.className = 'card-wrapper';

    if(swipable){
      var swipeBg = document.createElement('div');
      swipeBg.className = 'swipe-action';
      swipeBg.textContent = 'Done ✓';
      wrapper.appendChild(swipeBg);
    }

    var card = document.createElement('div');
    var statusClass = t.status === 'inprogress' ? 'status-inprogress' : (t.status === 'closed' ? 'status-closed' : '');
    card.className = 'task-card settled ' + statusClass;
    card.innerHTML =
      '<div class="card-top">' +
        '<span class="source-tag">' + escapeHtml(t.source || 'Manual') + '</span>' +
        '<span class="crit-badge crit-' + (t.criticality || 'Low') + '">' + (t.criticality || 'Low') + '</span>' +
      '</div>' +
      '<div class="desc">' + escapeHtml(t.description || '(untitled task)') + '</div>' +
      metaLine('Unit', t.unit) +
      metaLine('Action', t.action) +
      metaLine('Comment', t.comment) +
      metaLine('Feedback', t.feedback) +
      '<div class="card-controls">' +
        '<button class="chip-btn" data-role="cycle">' + statusLabel(t.status) + ' — tap to change</button>' +
        '<button class="chip-btn" data-role="edit">Edit</button>' +
      '</div>';

    card.querySelector('[data-role="cycle"]').addEventListener('click', function(){ cycleStatus(t); });
    card.querySelector('[data-role="edit"]').addEventListener('click', function(){ openEdit(t); });

    if(swipable) attachSwipe(card, wrapper, t);

    wrapper.appendChild(card);
    return wrapper;
  }

  function statusLabel(s){
    if(s === 'inprogress') return 'In progress';
    if(s === 'closed') return 'Closed';
    return 'Open';
  }

  function cycleStatus(t){
    var order = ['open','inprogress','closed'];
    var idx = order.indexOf(t.status || 'open');
    var next = order[(idx + 1) % order.length];
    t.status = next;
    if(next === 'closed') t.closedAt = new Date().toISOString();
    persistUpdate(t);
  }

  function toggleDaily(t){
    var doneToday = t.lastDone === todayStr();
    t.lastDone = doneToday ? '' : todayStr();
    persistUpdate(t);
  }

  // ---------- Swipe to close ----------
  function attachSwipe(card, wrapper, t){
    var startX = 0, currentX = 0, dragging = false;
    var threshold = -90;

    card.addEventListener('touchstart', function(e){
      startX = e.touches[0].clientX;
      dragging = true;
      card.classList.add('dragging');
      card.classList.remove('settled');
    }, {passive:true});

    card.addEventListener('touchmove', function(e){
      if(!dragging) return;
      currentX = e.touches[0].clientX - startX;
      if(currentX > 0) currentX = 0;
      card.style.transform = 'translateX(' + currentX + 'px)';
    }, {passive:true});

    card.addEventListener('touchend', function(){
      dragging = false;
      card.classList.remove('dragging');
      card.classList.add('settled');
      if(currentX < threshold){
        card.style.transform = 'translateX(-100%)';
        t.status = 'closed';
        t.closedAt = new Date().toISOString();
        setTimeout(function(){ persistUpdate(t); }, 180);
      } else {
        card.style.transform = 'translateX(0)';
      }
      currentX = 0;
    });
  }

  // ---------- Persist ----------
  function persistUpdate(t){
    render();
    saveCache();
    api('update', { task: t }).then(function(res){
      if(res && res.error) toast('Sync issue: ' + res.error);
    }).catch(function(){ toast('Saved locally — will sync once online'); });
  }

  function persistAdd(t){
    api('add', { task: t }).then(function(res){
      if(res && res.id){
        var idx = state.tasks.findIndex(function(x){ return x === t; });
        if(idx > -1) state.tasks[idx] = res;
        saveCache(); render();
      }
    }).catch(function(){ toast('Saved locally — will sync once online'); });
  }

  function persistDelete(id){
    state.tasks = state.tasks.filter(function(t){ return t.id !== id; });
    saveCache(); render();
    api('delete', { id: id }).catch(function(){});
  }

  // ---------- Modal: add/edit ----------
  var taskOverlay = document.getElementById('taskOverlay');
  var f = {
    description: document.getElementById('f_description'),
    unit: document.getElementById('f_unit'),
    source: document.getElementById('f_source'),
    action: document.getElementById('f_action'),
    comment: document.getElementById('f_comment'),
    criticality: document.getElementById('f_criticality'),
    status: document.getElementById('f_status'),
    feedback: document.getElementById('f_feedback'),
    isDaily: document.getElementById('f_isDaily')
  };

  function openAdd(){
    state.editingId = null;
    document.getElementById('taskModalTitle').textContent = 'Add task';
    document.getElementById('taskDeleteBtn').hidden = true;
    f.description.value = ''; f.unit.value=''; f.source.value='Runnability Corrective';
    f.action.value=''; f.comment.value=''; f.criticality.value='Medium';
    f.status.value='open'; f.feedback.value=''; f.isDaily.checked = false;
    taskOverlay.hidden = false;
  }

  function openEdit(t){
    state.editingId = t.id;
    document.getElementById('taskModalTitle').textContent = 'Edit task';
    document.getElementById('taskDeleteBtn').hidden = false;
    f.description.value = t.description || '';
    f.unit.value = t.unit || '';
    f.source.value = t.source || 'Manual';
    f.action.value = t.action || '';
    f.comment.value = t.comment || '';
    f.criticality.value = t.criticality || 'Medium';
    f.status.value = t.status || 'open';
    f.feedback.value = t.feedback || '';
    f.isDaily.checked = !!t.isDaily;
    taskOverlay.hidden = false;
  }

  document.getElementById('addBtn').addEventListener('click', openAdd);
  document.getElementById('taskCancelBtn').addEventListener('click', function(){ taskOverlay.hidden = true; });

  document.getElementById('taskSaveBtn').addEventListener('click', function(){
    if(!f.description.value.trim()){ toast('Add a description first'); return; }
    var data = {
      description: f.description.value.trim(),
      unit: f.unit.value.trim(),
      source: f.source.value,
      action: f.action.value.trim(),
      comment: f.comment.value.trim(),
      criticality: f.criticality.value,
      status: f.status.value,
      feedback: f.feedback.value.trim(),
      isDaily: f.isDaily.checked
    };

    if(state.editingId){
      var t = state.tasks.find(function(x){ return x.id === state.editingId; });
      Object.assign(t, data);
      persistUpdate(t);
    } else {
      var newTask = Object.assign({ id: 'local_' + Date.now(), lastDone:'' }, data);
      state.tasks.push(newTask);
      saveCache(); render();
      persistAdd(newTask);
    }
    taskOverlay.hidden = true;
  });

  document.getElementById('taskDeleteBtn').addEventListener('click', function(){
    if(state.editingId && confirm('Delete this task permanently?')){
      persistDelete(state.editingId);
      taskOverlay.hidden = true;
    }
  });

  // ---------- Closed drawer ----------
  var closedOpen = false;
  document.getElementById('toggleClosed').addEventListener('click', function(){
    closedOpen = !closedOpen;
    els.closedList.hidden = !closedOpen;
    this.querySelector('span') && null;
    this.innerHTML = 'Closed today (<span id="closedCount">' + els.closedCount.textContent + '</span>) ' + (closedOpen ? '▴' : '▾');
    els.closedCount = document.getElementById('closedCount');
  });

  // ---------- Init ----------
  loadCache();
  render();
  if(urlReady()) fetchAll();
  else { els.statusMsg.hidden = false; els.statusMsg.textContent = 'No Google Sheet connected — paste your script URL near the top of the <script> code.'; }

  // periodic light refresh
  setInterval(function(){ if(urlReady()) fetchAll(); }, 60000);
})();
</script>
</body>
</html>
